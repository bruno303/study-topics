name: Planning Poker Frontend Automated Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'planning-poker/frontend/planning-poker-front/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: 
      - main
    paths:
      - 'planning-poker/frontend/planning-poker-front/**'

env:
  APP_DIR: planning-poker/frontend/planning-poker-front
  DOCKER_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/planning-poker-frontend

jobs:
  tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ${{ env.APP_DIR }}
        run: npm test

  release:
    runs-on: ubuntu-latest
    needs:
      - tests

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Calculate and Increment Version
        id: versioning
        run: |
          LAST_TAG=$(git tag --list 'planning-poker-frontend/*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="0.0.0"
          else
            LAST_VERSION="${LAST_TAG#planning-poker-frontend/}"
          fi
          echo "Last version: $LAST_VERSION"

          MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
          PATCH=$(echo "$LAST_VERSION" | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New Version: $NEW_VERSION"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and Push Git Tag
        run: |
          git tag "planning-poker-frontend/${{ steps.versioning.outputs.NEW_VERSION }}"
          git push origin tag "planning-poker-frontend/${{ steps.versioning.outputs.NEW_VERSION }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: "[Production] Build and Push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.PRODUCTION_BACKEND_URL }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ vars.PRODUCTION_WEBSOCKET_URL }}
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}
            ${{ env.DOCKER_REPO }}:latest

      - name: "[Staging] Build and Push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.STAGING_BACKEND_URL }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ vars.STAGING_WEBSOCKET_URL }}
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}-stg

      - name: Summary
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 New Version: \`${{ steps.versioning.outputs.NEW_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "* **Image Tag [Staging]:** \`${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}-stg\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Image Tag [Production]:** \`${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
