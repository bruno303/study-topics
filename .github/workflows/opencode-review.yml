name: opencode-review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      contains(github.event.comment.body, ' /review-oc') ||
      startsWith(github.event.comment.body, '/review-oc') ||
      contains(github.event.comment.body, ' /review-opencode') ||
      startsWith(github.event.comment.body, '/review-opencode')
    uses: bruno303/github-actions/.github/workflows/opencode-review.yml@v0.0.2
    with:
      repository: ${{ github.repository }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      deepseek_api_key: ${{ secrets.DEEPSEEK_API_KEY }}

