name: Go Study CI

on:
  push:
    branches: [main]
    paths:
      - 'go_study/**'
  pull_request:
    branches: [main]
    paths:
      - 'go_study/**'

env:
  APP_DIR: go_study
  GO_VERSION: '1.25.4'

jobs:
  tests:
    name: Go Study Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - name: Download Dependencies
        run: go mod download

      - name: Verify Dependencies
        run: go mod verify

      - name: Start Infra Dependencies
        run: make docker-up-infra

      - name: Run Tests
        env:
          CONFIG_FILE: test.yaml
        run: make test

      - name: Stop Infra Dependencies
        if: always()
        run: make docker-down