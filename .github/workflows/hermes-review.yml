name: Hermes Agent PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      contains(github.event.comment.body, ' /review-hermes') ||
      startsWith(github.event.comment.body, '/review-hermes')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash

      - name: Setup DeepSeek V4 Pro Model
        run: |
          hermes config set model.provider deepseek
          hermes config set model.default deepseek-v4-pro
          hermes config set model.base_url https://api.deepseek.com
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Run PR Review
        run: |
          hermes skills run github-code-review \
            --pr=${{ github.event.number }} \
            --repo=${{ github.repository }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Post review as comment
        run: |
          gh pr comment ${{ github.event.number }} --body-file="review-output.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
