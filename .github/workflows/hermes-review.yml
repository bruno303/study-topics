name: Hermes Agent PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: |
      contains(github.event.comment.body, '/review-hermes') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Get PR details
        id: pr
        run: |
          PR_URL="${{ github.event.issue.pull_request.url }}"
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=pulls/)\d+')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash

      - name: Configure DeepSeek
        run: |
          hermes config set model.provider deepseek
          hermes config set model.default deepseek-v4-pro
          hermes config set model.base_url https://api.deepseek.com
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Fetch PR diff
        run: |
          gh pr diff ${{ steps.pr.outputs.PR_NUMBER }} > pr.diff 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Hermes review
        run: |
          PROMPT="You are reviewing Pull Request #${{ steps.pr.outputs.PR_NUMBER }}.
          Here is the git diff of all changes:
          \`\`\`diff
          $(cat pr.diff)
          \`\`\`
          Provide a concise code review. Focus on bugs, style issues, security problems, or suggestions for improvement. Be constructive and professional."
          
          hermes -s general chat -q "$PROMPT" > review-output.md 2>&1
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Post review as comment
        run: |
          # Ensure file exists even if empty
          if [ ! -s review-output.md ]; then echo "Review produced no output." > review-output.md; fi
          
          # Reply to the triggering comment
          COMMENT_BODY=$(cat review-output.md | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions --raw-field content=rocket
          
          gh pr comment ${{ steps.pr.outputs.PR_NUMBER }} \
            --body "**🤖 Hermes Review**  
            > Triggered by @${{ github.event.comment.user.login }}
            
            $(cat review-output.md)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
