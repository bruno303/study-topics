name: Planning Poker Backend Automated Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'planning-poker/**'
      - '!planning-poker/frontend/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: 
      - main
    paths:
      - 'planning-poker/**'
      - '!planning-poker/frontend/**'

env:
  APP_DIR: planning-poker
  DOCKER_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/planning-poker-backend
  GO_VERSION: '1.25.4'

jobs:
  tests-and-coverage:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ env.APP_DIR }}/go.sum

      - name: Download Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: go mod download

      - name: Verify Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: go mod verify

      - name: Run Tests
        working-directory: ${{ env.APP_DIR }}
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
        run: go test -timeout 30s -coverpkg=./internal/... -coverprofile=coverage.out ./...

      - name: Generate Coverage Report
        working-directory: ${{ env.APP_DIR }}
        run: go tool cover -func=coverage.out

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ env.APP_DIR }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ env.APP_DIR }}
          args: --timeout=5m

  release:
    runs-on: ubuntu-latest
    needs: 
      - tests-and-coverage
      - lint

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Calculate and Increment Version
        id: versioning
        run: |
          LAST_TAG=$(git tag --list 'planning-poker-backend/*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_VERSION="0.0.0"
          else
            LAST_VERSION="${LAST_TAG#planning-poker-backend/}"
          fi
          echo "Last version: $LAST_VERSION"

          MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
          PATCH=$(echo "$LAST_VERSION" | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New Version: $NEW_VERSION"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and Push Git Tag
        run: |
          git tag "planning-poker-backend/${{ steps.versioning.outputs.NEW_VERSION }}"
          git push origin tag "planning-poker-backend/${{ steps.versioning.outputs.NEW_VERSION }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}
            ${{ env.DOCKER_REPO }}:latest

      - name: Summary
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 New Version: \`${{ steps.versioning.outputs.NEW_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "* **Image Tag:** \`${{ env.DOCKER_REPO }}:${{ steps.versioning.outputs.NEW_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
