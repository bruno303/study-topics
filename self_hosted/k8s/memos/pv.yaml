apiVersion: v1
kind: PersistentVolume
metadata:
  name: memos-pv
  namespace: production
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/k3s-volumes/memos/memos"

