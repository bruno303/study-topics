apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: kube-system # Deploy in kube-system for full cluster access
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /var/log/positions.yaml
    clients:
      - url: http://loki.monitoring.svc.cluster.local/loki/api/v1/push
    scrape_configs:
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
        - role: pod
      pipeline_stages:
        - cri: {}
        - json:
            expressions:
              log_level: level
              log_message: message
        - timestamp:
            source: time
            format: RFC3339
        - labels:
            stream:
            log_level:
        - output:
            source: log_message
      relabel_configs:
        # Standard configs to extract pod metadata as labels (namespace, name, container)
        - source_labels: [__meta_kubernetes_pod_label_app]
          regex: (.+)
          target_label: app
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod_name
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container_name
        - source_labels: [__meta_kubernetes_pod_uid]
          target_label: pod_uid
          replacement: $1
          action: replace
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: __host__
        - source_labels:
          - __meta_kubernetes_namespace
          - __meta_kubernetes_pod_name
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
          regex: (.+);(.+);(.+);(.+)
          action: replace
          target_label: __path__
          replacement: /var/log/pods/${1}_${2}_${3}/${4}/*.log

    - job_name: host-docker-containers
      docker_sd_configs:
        - host: unix:///var/run/docker.sock
          refresh_interval: 30s
      pipeline_stages:
        - docker: {}
      relabel_configs:
        - source_labels: [__meta_docker_container_name]
          regex: ^/
          action: drop
        - source_labels: [__meta_docker_container_name]
          regex: ^/(.+)
          target_label: container_name
          replacement: ${1}
        - source_labels: [__meta_docker_container_id]
          target_label: container_id
        - source_labels: [__meta_docker_container_image]
          target_label: container_image
        # Keep useful compose labels
        - source_labels: [__meta_docker_container_label_com_docker_compose_project]
          target_label: compose_project
        - source_labels: [__meta_docker_container_label_com_docker_compose_service]
          target_label: compose_service
        # Drop high-cardinality and verbose labels
        - action: labeldrop
          regex: org_opencontainers_image_.*
        - action: labeldrop
          regex: com_docker_compose_config_hash
        - action: labeldrop
          regex: com_docker_compose_container_number
        - action: labeldrop
          regex: com_docker_compose_oneoff
        - action: labeldrop
          regex: com_docker_compose_version
        - action: labeldrop
          regex: com_docker_compose_project_config_files
        - action: labeldrop
          regex: com_docker_compose_project_working_dir
        - action: labeldrop
          regex: com_docker_compose_image
