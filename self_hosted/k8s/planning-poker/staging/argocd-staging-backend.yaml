apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-poker-staging-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bruno303/study-topics
    targetRevision: HEAD
    path: self_hosted/k8s/planning-poker/staging/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
