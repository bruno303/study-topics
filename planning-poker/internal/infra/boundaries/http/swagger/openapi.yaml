openapi: "3.0.3"
info:
  title: Planning Poker API
  description: |
    API for the Planning Poker application.
    This API allows creating rooms, managing clients, voting, and administration.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API and its dependencies
      operationId: healthcheck
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'

  /planning/room:
    post:
      summary: Create a new room
      description: Creates a new planning poker room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /planning/room/{roomID}:
    get:
      summary: Get room information
      description: Returns information about a specific room
      operationId: getRoom
      parameters:
        - name: roomID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRoomResponse'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /planning/{roomID}/ws:
    get:
      summary: WebSocket connection
      description: |
        Upgrades the HTTP connection to a WebSocket for real-time communication
      operationId: wsConnect
      parameters:
        - name: roomID
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade successful

  /admin/rooms:
    get:
      summary: Get all rooms state
      description: Returns the state of all rooms (admin only)
      operationId: getAllRoomsState
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: List of rooms and their clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomState'
        '401':
          description: Unauthorized

  /admin/rooms/{roomID}/client/{clientID}:
    delete:
      summary: Disconnect a client
      description: Disconnects a client from a room (admin only)
      operationId: disconnectClient
      parameters:
        - name: roomID
          in: path
          required: true
          schema:
            type: string
        - name: clientID
          in: path
          required: true
          schema:
            type: string
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Client disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: disconnected
        '401':
          description: Unauthorized
        '404':
          description: Room or client not found

  /admin/rooms/{roomID}/client/{clientID}/kick:
    post:
      summary: Kick a client
      description: Kicks a client from a room (admin only)
      operationId: kickClient
      parameters:
        - name: roomID
          in: path
          required: true
          schema:
            type: string
        - name: clientID
          in: path
          required: true
          schema:
            type: string
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Client kicked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: kicked
        '401':
          description: Unauthorized
        '404':
          description: Room or client not found

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer token format. Use: `Bearer <api_key>`"

  schemas:
    CreateRoomRequest:
      type: object
      required:
        - createdBy
      properties:
        createdBy:
          type: string
          description: The ID of the user creating the room

    CreateRoomResponse:
      type: object
      properties:
        roomId:
          type: string
          description: The ID of the created room

    GetRoomResponse:
      type: object
      properties:
        roomId:
          type: string
          description: The ID of the room

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message

    HealthcheckResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - fail
            - warn
        timestamp:
          type: integer
          format: int64
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/HealthStatus'
        summary:
          type: object
          properties:
            ok:
              type: integer
            fail:
              type: integer
            warn:
              type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - fail
            - warn
        message:
          type: string
        details:
          type: object

    RoomState:
      type: object
      properties:
        ID:
          type: string
        Clients:
          type: array
          items:
            $ref: '#/components/schemas/ClientState'

    ClientState:
      type: object
      properties:
        ID:
          type: string
        Name:
          type: string
        IsSpectator:
          type: boolean
        IsOwner:
          type: boolean
