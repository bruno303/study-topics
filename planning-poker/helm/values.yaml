# Global
nameOverride: "planning-poker"
fullnameOverride: ""

# Backend
backend:
  image:
    repository: bruno303/planning-poker-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  imagePullSecrets: []
  env:
    - name: ENVIRONMENT
      value: development
    - name: API_CORS_ALLOWED_ORIGINS
      value: "http://localhost:3000"
  extraEnv: []      # list of arbitrary env vars for deploy projects to inject
  secrets:
    adminApiKey: ""  # if non-empty, creates a Secret; otherwise expects existing
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# Frontend
frontend:
  image:
    repository: bruno303/planning-poker-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  imagePullSecrets: []
  env: {}            # No default env vars
  extraEnv: []       # escape hatch for deploy projects
  probes:
    liveness:
      enabled: true
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 15
    readiness:
      enabled: true
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 5
      periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# Ingress (disabled by default, deploy project enables per env)
ingress:
  backend:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []
  frontend:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Redis (bundled in chart, toggleable)
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  replicas: 1
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Metrics (toggleable)
metrics:
  enabled: true
  port: 9090
  path: /metrics

# Backend env vars that are hardcoded in the template (not in values):
# - LOG_LEVEL: DEBUG
# - TRACE_ENABLED: "true"
# - TRACE_OTLP_ENDPOINT: tempo.monitoring.svc.cluster.local:4317
# - API_TRACING_ENABLED: "true"
# - REDIS_PORT: "6379"
# - REDIS_DB: "0"
# - REDIS_PASSWORD: ""
# These are set directly in the deployment template. The deploy project can override via extraEnv if needed.
