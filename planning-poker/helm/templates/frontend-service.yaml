apiVersion: v1
kind: Service
metadata:
  name: {{ include "planning-poker.fullname" . }}-frontend
  labels:
    {{- include "planning-poker.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    {{- include "planning-poker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
